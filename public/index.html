<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next-Insight</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f7f2;
        color: #17211c;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #48524d;
        font-size: 16px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Next-Insight</h1>
      <p>Emily is online. Telegram webhook endpoint: /api/telegram</p>
    </main>
  </body>
</html>
